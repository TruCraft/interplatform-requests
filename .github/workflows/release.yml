name: Release & Publish

on:
  push:
    branches: [main]

jobs:
  release:
    if: github.repository == 'TruCraft/interplatform-requests'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Lint Lua with Stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: .

      - name: Install Lua 5.4 (for unit tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Run Lua unit tests
        run: lua5.4 tests/run_tests.lua

      - name: Determine next version from tags and info.json
        id: meta
        shell: bash
        run: |
          python - << 'PY' >> "$GITHUB_OUTPUT"
          import json, pathlib, subprocess, sys

          info_path = pathlib.Path('info.json')
          info = json.loads(info_path.read_text())

          # info.json should contain the manually maintained major.minor baseline
          base_ver = str(info.get('version', '0.0')).strip()
          parts = base_ver.split('.')

          # Enforce major.minor only in info.json (no patch component here)
          if len(parts) != 2:
            print(
              f"info.json version '{base_ver}' must be in 'major.minor' form (e.g. 0.6)",
              file=sys.stderr,
            )
            sys.exit(1)

          try:
            base_major, base_minor = map(int, parts)
          except ValueError:
            print(f"Invalid base version in info.json: {base_ver}", file=sys.stderr)
            sys.exit(1)

          # List existing tags of the form vX.Y.Z and find the latest
          res = subprocess.run(
            ['git', 'tag', '--list', 'v*'],
            check=True,
            capture_output=True,
            text=True,
          )
          tags = [t.strip() for t in res.stdout.splitlines() if t.strip()]

          last_major = last_minor = last_patch = None
          last_same_patch = None

          for t in tags:
            v = t.lstrip('v')
            segs = v.split('.')
            if len(segs) < 2:
              continue
            segs += ['0'] * (3 - len(segs))
            try:
              maj, min_, pat = map(int, segs[:3])
            except ValueError:
              continue

            if last_major is None or (maj, min_, pat) > (last_major, last_minor, last_patch):
              last_major, last_minor, last_patch = maj, min_, pat

            if maj == base_major and min_ == base_minor:
              if last_same_patch is None or pat > last_same_patch:
                last_same_patch = pat

          if last_major is not None:
            if (base_major, base_minor) < (last_major, last_minor):
              print(
                f"info.json version {base_major}.{base_minor} is behind latest tagged "
                f"{last_major}.{last_minor}",
                file=sys.stderr,
              )
              sys.exit(1)

          if last_same_patch is not None:
            patch = last_same_patch + 1
          else:
            patch = 0

          new_ver = f"{base_major}.{base_minor}.{patch}"
          info['version'] = new_ver
          info_path.write_text(json.dumps(info, indent=2) + "\n")

          print(f"mod_name={info['name']}")
          print(f"mod_version={new_ver}")
          print(f"tag_name=v{new_ver}")
          PY

      - name: Create mod archive
        shell: bash
        run: |
          mkdir -p dist build
          ZIP_NAME="${{ steps.meta.outputs.mod_name }}_${{ steps.meta.outputs.mod_version }}"
          MOD_DIR="build/$ZIP_NAME"
          echo "Preparing mod directory: $MOD_DIR"
          rm -rf "$MOD_DIR"
          mkdir -p "$MOD_DIR"

          rsync -a ./ "$MOD_DIR"/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude 'build' \
            --exclude 'tests' \
            --exclude '*.psd'

          echo "Creating archive: dist/$ZIP_NAME.zip"
          (cd build && zip -r "../dist/$ZIP_NAME.zip" "$ZIP_NAME")

      - name: Upload mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.mod_name }}_${{ steps.meta.outputs.mod_version }}
          path: dist/*.zip

      - name: Create Git tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: dist/${{ steps.meta.outputs.mod_name }}_${{ steps.meta.outputs.mod_version }}.zip

      - name: Upload to Factorio Mod Portal
        uses: mchangrh/factorio-mod-upload@v2
        with:
          mod-name: interplatform-requests
        env:
          FACTORIO_MODS_TOKEN: ${{ secrets.FACTORIO_TOKEN }}
          FILENAME: dist/${{ steps.meta.outputs.mod_name }}_${{ steps.meta.outputs.mod_version }}.zip

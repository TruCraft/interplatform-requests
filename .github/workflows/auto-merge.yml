name: Auto-merge PRs

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Find PR number
        id: pr
        run: |
          PR_NUMBER=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
            --jq '.artifacts' -q 2>/dev/null || echo "")

          # Get PR from the head branch
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" \
            --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number')

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Merge PR
        if: steps.pr.outputs.number
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
            --squash --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
